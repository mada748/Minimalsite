<!DOCTYPE html>
<html>
<head>
    <style>
        /* An ai coded this since the page is about an AI checking your age so why doesn't the AI code itself?
        /* The Overlay (Background) - Hidden by default */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; /* Changed from flex to none */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            border: none;
            background: none;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }
    </style>
</head>
<body>

    <button onclick="requestCameraAndShow()">Start Verification</button>

    <div class="overlay" id="popup">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('popup').style.display = 'none'">&times;</button>
            <h3>Verification Check</h3>
            <p>Please complete the process below.</p>
            <iframe id="veriff-iframe" src="https://showcase.veriff.com/public/" allow="camera"></iframe>
            <h1>🐟</h1>
        </div>
    </div>

    <script>
        async function requestCameraAndShow() {
            try {
                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // If successful, stop the tracks (to release the camera for the iframe)
                stream.getTracks().forEach(track => track.stop());

                // Show the popup
                document.getElementById('popup').style.display = 'flex';
                
            } catch (err) {
                // Handle denial or lack of camera
                console.error("Camera access denied or unavailable:", err);
                alert("Camera access is required for verification. Please enable it in your browser settings.");
            }
        }

        // Optional: Auto-trigger on page load
        // window.onload = requestCameraAndShow;
    </script>
</body>
</html>
