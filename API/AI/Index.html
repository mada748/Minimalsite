<!doctype html>
<html>
    <head>
        
        <style>

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }


            .modal-content {
                background: white;
                padding: 20px;
                border-radius: 8px;
                width: 80%;
                max-width: 600px;
                position: relative;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }

            .close-btn {
                position: absolute;
                top: 10px;
                right: 15px;
                font-size: 24px;
                cursor: pointer;
                border: none;
                background: none;
            }

            iframe {
                width: 100%;
                height: 400px;
                border: none;
            }
        </style>
    </head>
    <body>
        <div class="overlay" id="popup">
            <div class="modal-content">
                <button
                    class="close-btn"
                    onclick="
                        document.getElementById('popup').style.display = 'none'
                    "
                >
                    &times;
                </button>
                <h3>Verification Check</h3>
                <p>Please complete the process below.</p>
                <iframe src="https://showcase.veriff.com/public/"></iframe>
            </div>
        </div>
    </body>
</html>
